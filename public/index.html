<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luces 1B · Casa de Máquinas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                500: '#facc15',
                600: '#eab308',
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="mx-auto max-w-xl px-6 py-10">
      <header class="mb-8">
        <div class="flex items-center justify-between gap-4">
          <div>
            <h1 class="text-2xl font-bold tracking-tight">Luces · Casa de Máquinas 1B</h1>
            <p class="text-sm text-slate-400 mt-1">Control manual y automático</p>
          </div>
          <div
            id="connStatus"
            class="flex items-center gap-2 rounded-full bg-slate-900/60 ring-1 ring-slate-800 px-3 py-1.5 text-sm"
            title="Lectura del coil de estado"
          >
            <span class="relative inline-flex h-3 w-3">
              <span
                id="connPing"
                class="absolute inline-flex h-full w-full rounded-full opacity-75 hidden"
              ></span>
              <span
                id="connDot"
                class="relative inline-flex h-3 w-3 rounded-full bg-slate-500"
              ></span>
            </span>
            <span id="connText" class="text-slate-400">Conectando...</span>
          </div>
        </div>
      </header>

      <!-- Tarjeta de control de luces -->
      <section class="rounded-2xl bg-slate-900/70 ring-1 ring-slate-800 p-6 mb-6">
        <div class="flex items-center gap-5">
          <div
            id="bulb"
            class="h-14 w-14 rounded-full bg-slate-700 ring-2 ring-slate-800 flex items-center justify-center transition-all duration-300 flex-shrink-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              class="h-7 w-7 text-slate-300"
              fill="currentColor"
            >
              <path
                d="M9 21h6v-1H9v1zm3-20a8 8 0 0 0-5 14.32V18a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-2.68A8 8 0 0 0 12 1z"
              />
            </svg>
          </div>
          <div class="flex-1">
            <p id="stateLabel" class="text-xl font-semibold">—</p>
            <p id="stateMeta" class="text-xs text-slate-500 mt-1">Esperando lectura...</p>
          </div>
          <label class="inline-flex items-center cursor-pointer">
            <input id="lightToggle" type="checkbox" class="sr-only peer" />
            <span
              class="relative w-14 h-7 bg-slate-700 peer-checked:bg-brand-500 rounded-full transition-colors after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:h-6 after:w-6 after:rounded-full after:bg-white after:transition-transform peer-checked:after:translate-x-7 peer-disabled:opacity-50"
            ></span>
          </label>
        </div>
      </section>

      <!-- Modo automático -->
      <section class="rounded-2xl bg-slate-900/70 ring-1 ring-slate-800 p-6 mb-6">
        <div class="flex items-center justify-between mb-5">
          <div>
            <h2 class="text-lg font-semibold">Modo automático</h2>
            <p id="autoEnabledLabel" class="text-sm text-slate-400">Desactivado</p>
          </div>
          <label class="inline-flex items-center cursor-pointer">
            <input id="autoEnabled" type="checkbox" class="sr-only peer" />
            <span
              class="relative w-14 h-7 bg-slate-700 peer-checked:bg-brand-500 rounded-full transition-colors after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:h-6 after:w-6 after:rounded-full after:bg-white after:transition-transform peer-checked:after:translate-x-7"
            ></span>
          </label>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-5">
          <label class="block">
            <span class="text-sm text-slate-300">Encendido</span>
            <input
              id="timeOn"
              type="time"
              class="mt-1 w-full rounded-lg bg-slate-800 ring-1 ring-slate-700 px-3 py-2 text-lg font-mono focus:outline-none focus:ring-2 focus:ring-brand-500"
            />
          </label>
          <label class="block">
            <span class="text-sm text-slate-300">Apagado</span>
            <input
              id="timeOff"
              type="time"
              class="mt-1 w-full rounded-lg bg-slate-800 ring-1 ring-slate-700 px-3 py-2 text-lg font-mono focus:outline-none focus:ring-2 focus:ring-brand-500"
            />
          </label>
        </div>

        <div class="flex items-center justify-between gap-3">
          <div class="text-xs text-slate-400 leading-5" id="nextRuns">—</div>
          <button
            id="btnSaveSchedule"
            class="rounded-lg bg-brand-500 hover:bg-brand-600 text-slate-950 font-semibold px-5 py-2 transition disabled:opacity-50"
          >
            Guardar
          </button>
        </div>
      </section>

      <!-- Toast -->
      <div
        id="toast"
        class="fixed bottom-6 right-6 hidden rounded-lg bg-slate-800 ring-1 ring-slate-700 px-4 py-3 text-sm shadow-lg"
      ></div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      const stateLabel = $('stateLabel');
      const stateMeta = $('stateMeta');
      const bulb = $('bulb');
      const connDot = $('connDot');
      const connPing = $('connPing');
      const connText = $('connText');
      const lightToggle = $('lightToggle');
      const autoEnabled = $('autoEnabled');
      const autoEnabledLabel = $('autoEnabledLabel');
      const timeOn = $('timeOn');
      const timeOff = $('timeOff');
      const nextRuns = $('nextRuns');
      const btnSaveSchedule = $('btnSaveSchedule');
      const toast = $('toast');

      let lightToggleInFlight = false;
      let autoToggleInFlight = false;
      let autoActivoActual = false;

      let toastTimer = null;
      function showToast(msg, type = 'info') {
        toast.textContent = msg;
        toast.className =
          'fixed bottom-6 right-6 rounded-lg px-4 py-3 text-sm shadow-lg ring-1 ' +
          (type === 'error'
            ? 'bg-rose-950 ring-rose-800 text-rose-100'
            : type === 'success'
              ? 'bg-emerald-950 ring-emerald-800 text-emerald-100'
              : type === 'warn'
                ? 'bg-amber-950 ring-amber-800 text-amber-100'
                : 'bg-slate-800 ring-slate-700 text-slate-100');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.className = 'fixed bottom-6 right-6 hidden';
        }, 3500);
      }

      function setBulb(encendida) {
        if (encendida) {
          bulb.className =
            'h-14 w-14 rounded-full bg-brand-500 ring-2 ring-brand-500/40 flex items-center justify-center transition-all duration-300 flex-shrink-0 shadow-[0_0_30px_8px_rgba(250,204,21,0.45)]';
          bulb.querySelector('svg').setAttribute('class', 'h-7 w-7 text-amber-900');
          stateLabel.textContent = 'Encendidas';
          stateLabel.className = 'text-xl font-semibold text-brand-500';
        } else {
          bulb.className =
            'h-14 w-14 rounded-full bg-slate-700 ring-2 ring-slate-800 flex items-center justify-center transition-all duration-300 flex-shrink-0';
          bulb.querySelector('svg').setAttribute('class', 'h-7 w-7 text-slate-300');
          stateLabel.textContent = 'Apagadas';
          stateLabel.className = 'text-xl font-semibold text-slate-300';
        }
      }

      function setConnected(ok, msg) {
        if (ok) {
          connDot.className = 'relative inline-flex h-3 w-3 rounded-full bg-emerald-500';
          connPing.className = 'absolute inline-flex h-full w-full rounded-full bg-emerald-500 opacity-75 animate-ping';
          connText.textContent = msg || 'Conectado';
          connText.className = 'text-emerald-400 font-medium';
        } else {
          connDot.className = 'relative inline-flex h-3 w-3 rounded-full bg-rose-500';
          connPing.className = 'absolute inline-flex h-full w-full rounded-full opacity-75 hidden';
          connText.textContent = msg || 'Sin lectura';
          connText.className = 'text-rose-400 font-medium';
        }
      }

      function fmtFechaLocal(iso) {
        if (!iso) return '—';
        try {
          return new Date(iso).toLocaleString('es-GT', { hour12: false });
        } catch {
          return iso;
        }
      }

      async function api(method, path, body) {
        const res = await fetch(path, {
          method,
          headers: body ? { 'Content-Type': 'application/json' } : undefined,
          body: body ? JSON.stringify(body) : undefined,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }

      async function refrescar() {
        try {
          const data = await api('GET', '/api/status');
          setConnected(true);
          setBulb(data.encendida);
          stateMeta.textContent = 'Lectura · ' + new Date().toLocaleTimeString('es-GT');

          const s = data.schedule;
          autoActivoActual = !!s.enabled;

          if (!lightToggleInFlight) {
            lightToggle.checked = !!data.encendida;
            lightToggle.disabled = autoActivoActual;
          }
          if (!autoToggleInFlight) {
            autoEnabled.checked = autoActivoActual;
            autoEnabledLabel.textContent = autoActivoActual ? 'Activado' : 'Desactivado';
          }

          if (!timeOn.matches(':focus')) timeOn.value = s.on;
          if (!timeOff.matches(':focus')) timeOff.value = s.off;
          nextRuns.innerHTML =
            'Próximo ON: <span class="text-emerald-400">' +
            fmtFechaLocal(s.nextOn) +
            '</span><br/>Próximo OFF: <span class="text-rose-400">' +
            fmtFechaLocal(s.nextOff) +
            '</span>' +
            (s.lastEvent
              ? '<br/>Último: <span class="' +
                (s.lastEvent.success ? 'text-emerald-400' : 'text-rose-400') +
                '">' +
                s.lastEvent.type.toUpperCase() +
                '</span> · ' +
                fmtFechaLocal(s.lastEvent.at)
              : '');
        } catch (err) {
          setConnected(false);
          stateLabel.textContent = '—';
          stateMeta.textContent = 'Sin lectura — ' + err.message;
        }
      }

      lightToggle.addEventListener('change', async () => {
        if (lightToggleInFlight) return;
        const queremosEncender = lightToggle.checked;

        if (autoActivoActual) {
          lightToggle.checked = !queremosEncender;
          showToast(
            'Modo automático activo · desactívalo para operar manualmente.',
            'warn',
          );
          return;
        }

        lightToggleInFlight = true;
        lightToggle.disabled = true;
        try {
          await api('POST', queremosEncender ? '/api/on' : '/api/off');
          showToast(
            queremosEncender ? 'Pulso de encendido enviado' : 'Pulso de apagado enviado',
            'success',
          );
          setTimeout(refrescar, 400);
        } catch (err) {
          lightToggle.checked = !queremosEncender;
          showToast('Error: ' + err.message, 'error');
        } finally {
          lightToggle.disabled = false;
          lightToggleInFlight = false;
        }
      });

      autoEnabled.addEventListener('change', async () => {
        if (autoToggleInFlight) return;
        const nuevoEstado = autoEnabled.checked;
        autoEnabledLabel.textContent = nuevoEstado ? 'Activado' : 'Desactivado';
        autoToggleInFlight = true;
        autoEnabled.disabled = true;
        try {
          await api('PUT', '/api/schedule', { enabled: nuevoEstado });
          showToast(
            nuevoEstado ? 'Modo automático activado' : 'Modo automático desactivado',
            'success',
          );
          refrescar();
        } catch (err) {
          autoEnabled.checked = !nuevoEstado;
          autoEnabledLabel.textContent = !nuevoEstado ? 'Activado' : 'Desactivado';
          showToast('Error: ' + err.message, 'error');
        } finally {
          autoEnabled.disabled = false;
          autoToggleInFlight = false;
        }
      });

      btnSaveSchedule.addEventListener('click', async () => {
        btnSaveSchedule.disabled = true;
        try {
          await api('PUT', '/api/schedule', {
            on: timeOn.value,
            off: timeOff.value,
          });
          showToast('Horario guardado', 'success');
          refrescar();
        } catch (err) {
          showToast('Error: ' + err.message, 'error');
        } finally {
          btnSaveSchedule.disabled = false;
        }
      });

      refrescar();
      setInterval(refrescar, 5000);
    </script>
  </body>
</html>
